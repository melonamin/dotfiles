# See https://wiki.hyprland.org/Configuring/Monitors/

# Change to 1 if on a 1x display (then change last "auto" to 1 in monitor=)
# Change to something like 1.75 for fractional scaling (can work well with 1.66667 monitor scaling)
# Note: You must relaunch Hyprland after changing any env like this (use Super+Esc, then Relaunch)
env = GDK_SCALE,2

# Format: monitor = [port or desc:], resolution, position, scale
# See all monitors with: hyprctl monitors

# Apple Studio Display (Apple Computer Inc StudioDisplay)
# Native 5K panel driven via DSC over a single DP connection on DP-7.
# Scale 2 gives a logical 2560x1440 workspace with pixel-perfect 1:1 mapping
# (every logical pixel = 4 physical pixels, no firmware/GPU scaler in path).
# DP-8 is kept disabled defensively; the Apple doesn't expose it, but
# disable-phantom-monitors.sh is the other backstop if anything ever appears.
monitor=DP-8, disable
monitor=DP-7, 5120x2880@60, 0x0, 2

# --- LG UltraFine 5K (LG UltraFine 005MXTCKS153) — kept for reference ---
# This panel is MST-tiled but DP-7's EDID declares "Behavior if it is the
# only tile: Image is scaled to fit the entire tiled display". So driving
# DP-7 alone at its preferred 3840x2160 mode lets the panel firmware scale
# to native 5K internally. DP-8 is the right-tile-only connector (no
# combined mode advertised), so it's disabled.
# monitor=DP-8, disable
# monitor=DP-7, 3840x2160@60, 0x0, 1.5
#
# Native MST tiled mode (didn't light the panel here, kept for completeness):
# monitor=DP-7, 2560x2880@60, 0x0, 2
# monitor=DP-8, 2560x2880@60, 1280x0, 2

# Fallback for any other monitors (auto position prevents overlap)
monitor=,preferred,auto,auto

# Example for fractional scaling that works well with GDK_SCALE,1.75
# monitor=,preferred,auto,1.666667
