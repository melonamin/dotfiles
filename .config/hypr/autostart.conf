# Extra autostart processes
# exec-once = uwsm app -- my-service

# Disable phantom monitor duplicates (e.g. Apple Studio Display registering two ports)
exec-once = ~/.config/hypr/scripts/disable-phantom-monitors.sh

# Self-heal monitors on hot-plug (re-runs phantom cleanup + config reload)
exec-once = ~/.config/hypr/scripts/monitor-hotplug-listener.sh

# Pre-warm Walker (app launcher / omarchy-menu backend) so menus open instantly.
# Without this, the first invocation pays a cold GTK + desktop-entry-scan
# start, because omarchy-launch-walker races the background service it spawns
# and falls back to a standalone walker. GSK_RENDERER=cairo matches what
# omarchy-launch-walker uses on its lazy path (skips GL init).
exec-once = uwsm-app -- env GSK_RENDERER=cairo walker --gapplication-service

# OSD daemon for volume/brightness overlays. Omarchy's media keybindings
# call swayosd-client, which silently no-ops without a running server.
exec-once = uwsm-app -- swayosd-server
